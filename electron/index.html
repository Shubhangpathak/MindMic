<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindMic</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
 <style>
      .toast-enter {
        animation: toast-in 240ms cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
      }

      .toast-leave {
        animation: toast-out 180ms ease forwards;
      }

      .recording-pulse {
        animation: recording-pulse 1.15s ease-in-out infinite;
      }

      @keyframes toast-in {
        to {
          opacity: 1;
          transform: translateX(0) scale(1);
        }
      }

      @keyframes toast-out {
        to {
          opacity: 0;
          transform: translateX(18px) scale(0.98);
        }
      }

      @keyframes recording-pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }

        50% {
          opacity: 0.35;
          transform: scale(0.72);
        }
      }
    </style>

  <body class="h-screen overflow-hidden">
    <div class=" flex h-full w-full gap-12 text-center">
      <!-- context menu -->
    <div class="w-1/5 bg-transparent flex flex-col">
    <aside class="h-screen bg-[#F2F1F1]/85 backdrop-blur-[16px] backdrop-saturate-150 border-r border-[#BBBBBB] flex flex-col p-4 font-sans shrink-0 shadow-[0_12px_32px_rgba(0,0,0,0.12)]">
  
  <div class="px-2 mb-6 mt-2 flex gap-2">
    <img src="./icons/app-icon-svg.svg" alt="mindmic logo" class="w-8">
    <h2 class="text-[1.1rem] font-semibold text-[#202020] tracking-tight">Mindmic Recorder</h2>
  </div>

  <button id="new-meeting-btn" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-[#1A1A1A] text-white rounded-[10px] text-[0.95rem] font-medium hover:bg-[#333333] transition-colors shadow-sm mb-8">
    <img src="./icons/bx-plus.svg" class="w-[18px] opacity-90" alt="Plus Icon">
    <span>New Meeting</span>
  </button>

  <div class="px-2 mb-2">
    <h4 class="text-sm text-[#8E8C8A] tracking-wider text-left">Recents</h4>
  </div>

  <div id="sidebar-list" class="flex-1 overflow-y-auto space-y-1 -mx-2 px-2">
  </div>

  <div class="flex flex-col border-t border-[#D7D4E3] pt-3 gap-2">

  <button
    class="flex items-center gap-3 w-full rounded-lg px-3 py-2
    hover:bg-white hover:shadow-sm transition">

    <img src="./icons/cog.svg" class="w-5 h-5">

    <span class="font-medium text-gray-700">
      Settings
    </span>

  </button>

  <!-- <button
    class="flex items-center gap-3 w-full rounded-lg px-3 py-2
    hover:bg-white hover:shadow-sm transition">

    <img src="./icons/bx-user-circle.svg" class="w-5 h-5">

    <span class="font-medium text-gray-700">
      User
    </span>

  </button> -->

</div>



</aside>
    </div>
      
    <!-- transcription side -->
      <div class=" h-screen w-2/5">
        
        <div class="container border-black-1px text-left">
          <h1 class="text-4xl bold pb-2 ">Meetings Recorder</h1>
          <div class="controls flex gap-4 w-auto mx-1px">
            <button
              id="startBtn"
              class="flex items-center gap-3 px-12 py-2 border-1 border-[#BBBBBB] bg-[#F2F1F1] text-black text-[1rem] rounded-xl cursor-pointer"
            >
              <span class="w-3.5 h-3.5 bg-[#C85C4A] rounded-full"></span>
              Record
            </button>

            <button
              id="stopBtn"
              class="flex items-center gap-3 px-6 py-2 border-1 border-[#BBBBBB] bg-[#F2F1F1] text-black text-[1rem] rounded-xl cursor-pointer"
            >
              <span class="w-3.5 h-3.5 bg-[#C85C4A] rounded-sm"></span>
              Stop recording
            </button>
          </div>
          <div id="status" class="hidden">
            Ready to record
          </div>
        </div>
        
        <div class="flex gap-3">
          <audio controls id="audioPlayer"></audio>
          <button
            id="analyzeBtn"
            class="border-1 border-[#BBBBBB] px-3 py-xl bg-black text-white rounded-xl"
          >
            analyze
          </button>
          <select id="mode-select" class="border-1 border-[#BBBBBB] rounded-xl px-3 py-2 bg-[#F2F1F1] text-black">
            <option value="local" selected>Local whisper</option>
            <option value="cloud">☁️ Cloud (Later)</option>
          </select>
        </div>
        
        <select id="mic-select" class="border-1 border-[#BBBBBB] px-3 py-2 bg-[#F2F1F1] text-black rounded-xl">
          <option>Loading microphones...</option>
        </select>

        <div id="transcript-output" class="border-1 border-[#BBBBBB] max-w-[720px] h-[calc(98vh-210px)] overflow-y-auto px-7 py-6 bg-[#F7F7F7] text-black rounded-xl select-none leading-7 text-left">
          <h3 class="text-2xl font-semibold">Meeting Transcription</h3>
          <p id="summary-placeholder" class="text-sm text-[#666666] mb-5">Transcription will appear here</p>
          <p id="transcript-text"></p>
        </div>
      </div>

      <!-- summary side -->
      <div class="container w-2/5 h-screen">
        
        <div class="flex justify-content-between gap-13">
          <h4 class="text-4xl">Key notes & Summary</h2>
        </div>
        
        <div class="flex items-center gap-3 mb-4">
          <button class="border-1 border-black px-5 py-3 bg-black text-white rounded-xl text-[1rem] cursor-pointer" id="summaryBtn">
            Generate Summary
          </button>
          <!-- <button id="test-meeting-btn" style="padding: 10px; background: blue; color: white;">
            Create New Meeting Folder
          </button> -->
          <select id="summary-provider" class="border-1 border-[#BBBBBB] rounded-xl px-4 py-3 bg-[#F2F1F1] text-black text-[1rem]">
            <option value="ollama" selected>Local ollama</option>
            <option value="api">Use api</option>
          </select>
        </div>
        
        <div id="summary-output" class="border-1 border-[#BBBBBB] max-w-[720px] h-[calc(100vh-210px)] overflow-y-auto px-7 py-6 bg-[#F7F7F7] text-black rounded-xl select-none leading-7 text-left">
          <h3 id="summary-title" class="text-2xl font-semibold mb-2">Meeting summary</h3>
          <p id="summary-placeholder" class="text-sm mb-5">Summary will appear here</p>
          <div id="summary-paragraph" class="text-[1.05rem] whitespace-pre-wrap"></div>
        </div>
      </div>
      
    </div>
    <div id="toast-region" class="fixed right-4 top-4 z-50 flex w-[min(92vw,22rem)] flex-col items-end gap-3 pointer-events-none"></div>
    <script src="./renderer/app.js"></script>
  </body>
</html>
